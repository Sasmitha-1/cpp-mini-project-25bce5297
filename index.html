<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Personal Savings Account System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg1:#08111f;
      --bg2:#0b1729;
      --card:#0d1b2d;
      --card2:#101f35;
      --line:rgba(255,255,255,0.08);
      --text:#eef4ff;
      --muted:#9fb1cc;
      --accent:#6aa7ff;
      --accent2:#7b61ff;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(106,167,255,0.20), transparent 25%),
        radial-gradient(circle at top right, rgba(123,97,255,0.18), transparent 25%),
        linear-gradient(145deg,var(--bg1),var(--bg2));
      color:var(--text);
    }

    .wrap{
      max-width:1280px;
      margin:0 auto;
      padding:24px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:22px 28px;
      border:1px solid var(--line);
      border-radius:24px;
      background:rgba(255,255,255,0.03);
      margin-bottom:22px;
    }

    .topbar h1{
      margin:0;
      font-size:2rem;
    }

    .topbar p{
      margin:6px 0 0;
      color:var(--muted);
    }

    .pill{
      padding:12px 18px;
      border:1px solid var(--line);
      border-radius:999px;
      color:var(--muted);
      font-weight:600;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
    }

    .card{
      background:linear-gradient(180deg,var(--card),var(--card2));
      border:1px solid var(--line);
      border-radius:24px;
      padding:22px;
      box-shadow:0 20px 50px rgba(0,0,0,0.25);
    }

    .card h2{
      margin:0 0 18px;
      font-size:1.2rem;
    }

    .card.full{
      grid-column:span 3;
    }

    label{
      display:block;
      margin:14px 0 8px;
      font-size:0.95rem;
      color:var(--muted);
    }

    input{
      width:100%;
      padding:14px 16px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#0a1526;
      color:var(--text);
      font-size:1rem;
      outline:none;
    }

    button{
      margin-top:16px;
      width:100%;
      padding:14px 16px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:white;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
    }

    button:hover{
      opacity:0.95;
    }

    .small-btn{
      width:auto;
      padding:12px 16px;
      margin-right:10px;
    }

    pre{
      margin:0;
      white-space:pre-wrap;
      word-wrap:break-word;
      font-family:ui-monospace, SFMono-Regular, Menlo, monospace;
      background:#06101d;
      border:1px solid var(--line);
      border-radius:18px;
      padding:20px;
      min-height:220px;
      color:#eaf2ff;
      overflow:auto;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:16px;
    }

    @media (max-width: 1100px){
      .grid{grid-template-columns:1fr 1fr}
      .card.full{grid-column:span 2}
    }

    @media (max-width: 760px){
      .grid{grid-template-columns:1fr}
      .card.full{grid-column:span 1}
      .topbar{flex-direction:column;align-items:flex-start;gap:12px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>Personal Savings Account System</h1>
        <p>Mini Banking System • Clickable Website Version • C++ OOP + WebAssembly</p>
      </div>
      <div class="pill">DA2 • 25BCE5297</div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Create Account</h2>
        <label>Account Number</label>
        <input id="createAccNo" type="number">
        <label>Name</label>
        <input id="createName" type="text">
        <label>Initial Balance</label>
        <input id="createBalance" type="number" step="0.01">
        <button onclick="createAccount()">Create Account</button>
      </div>

      <div class="card">
        <h2>Deposit Money</h2>
        <label>Account Number</label>
        <input id="depositAccNo" type="number">
        <label>Amount</label>
        <input id="depositAmount" type="number" step="0.01">
        <button onclick="depositMoney()">Deposit</button>
      </div>

      <div class="card">
        <h2>Withdraw Money</h2>
        <label>Account Number</label>
        <input id="withdrawAccNo" type="number">
        <label>Amount</label>
        <input id="withdrawAmount" type="number" step="0.01">
        <button onclick="withdrawMoney()">Withdraw</button>
      </div>

      <div class="card">
        <h2>Balance Enquiry</h2>
        <label>Account Number</label>
        <input id="balanceAccNo" type="number">
        <button onclick="balanceEnquiry()">Check Balance</button>
      </div>

      <div class="card">
        <h2>Low Balance Report</h2>
        <label>Threshold</label>
        <input id="thresholdValue" type="number" step="0.01">
        <button onclick="lowBalanceReport()">Show Low Balances</button>
      </div>

      <div class="card">
        <h2>Quick Actions</h2>
        <button onclick="totalMoneyReport()">Total Money Report</button>
        <button onclick="viewAllAccounts()">View All Accounts</button>
        <button onclick="viewTransactions()">View Transactions</button>
      </div>

      <div class="card full">
        <h2>Application Output</h2>
        <div class="actions">
          <button class="small-btn" onclick="clearOutput()">Clear Output</button>
        </div>
        <pre id="output">Website loaded. Ready for interaction.</pre>
      </div>
    </div>
  </div>

  <script>
    function showOutput(text) {
      document.getElementById("output").textContent = text;
    }

    function createAccount() {
      const accNo = parseInt(document.getElementById("createAccNo").value);
      const name = document.getElementById("createName").value;
      const balance = parseFloat(document.getElementById("createBalance").value);

      const result = Module.ccall(
        "create_account",
        "string",
        ["number", "string", "number"],
        [accNo, name, balance]
      );
      showOutput(result);
    }

    function depositMoney() {
      const accNo = parseInt(document.getElementById("depositAccNo").value);
      const amount = parseFloat(document.getElementById("depositAmount").value);

      const result = Module.ccall(
        "deposit_money",
        "string",
        ["number", "number"],
        [accNo, amount]
      );
      showOutput(result);
    }

    function withdrawMoney() {
      const accNo = parseInt(document.getElementById("withdrawAccNo").value);
      const amount = parseFloat(document.getElementById("withdrawAmount").value);

      const result = Module.ccall(
        "withdraw_money",
        "string",
        ["number", "number"],
        [accNo, amount]
      );
      showOutput(result);
    }

    function balanceEnquiry() {
      const accNo = parseInt(document.getElementById("balanceAccNo").value);

      const result = Module.ccall(
        "balance_enquiry",
        "string",
        ["number"],
        [accNo]
      );
      showOutput(result);
    }

    function totalMoneyReport() {
      const result = Module.ccall(
        "total_money_report",
        "string",
        [],
        []
      );
      showOutput(result);
    }

    function lowBalanceReport() {
      const threshold = parseFloat(document.getElementById("thresholdValue").value);

      const result = Module.ccall(
        "low_balance_report",
        "string",
        ["number"],
        [threshold]
      );
      showOutput(result);
    }

    function viewAllAccounts() {
      const result = Module.ccall(
        "view_all_accounts",
        "string",
        [],
        []
      );
      showOutput(result);
    }

    function viewTransactions() {
      const result = Module.ccall(
        "view_transactions",
        "string",
        [],
        []
      );
      showOutput(result);
    }

    function clearOutput() {
      showOutput("Output cleared.");
    }

    var Module = {
      onRuntimeInitialized: function () {
        showOutput("WASM loaded successfully. You can now use the banking system.");
      }
    };
  </script>

  <script async src="index.js"></script>
</body>
</html>
