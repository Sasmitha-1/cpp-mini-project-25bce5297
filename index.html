<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velora Bank</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0c0c0f;
  color:#eaeaea;
}

.app{
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#111116;
  border-right:1px solid rgba(255,255,255,0.05);
  padding:20px;
}

.logo{
  font-size:20px;
  font-weight:700;
  margin-bottom:30px;
  color:#fff;
}

.nav button{
  width:100%;
  background:none;
  border:none;
  color:#aaa;
  padding:12px;
  text-align:left;
  border-radius:10px;
  margin-bottom:8px;
  cursor:pointer;
}

.nav button:hover{
  background:#1b1b22;
  color:#fff;
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
  overflow:auto;
}

.section{ display:none; }
.section.active{ display:block; }

/* CARDS */
.card{
  background:#15151c;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}

/* BUTTON */
.btn{
  background:linear-gradient(135deg,#6b0f1a,#a71d31);
  border:none;
  padding:12px;
  border-radius:10px;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#1c1c24;
  border:none;
  color:white;
  border-radius:8px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.output{
  margin-top:15px;
  background:#101017;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">Velora Bank</div>

  <div class="nav">
    <button onclick="show('dashboard')">Dashboard</button>
    <button onclick="show('accounts')">Accounts</button>
    <button onclick="show('deposit')">Deposit</button>
    <button onclick="show('withdraw')">Withdraw</button>
    <button onclick="show('transactions')">Transactions</button>
    <button onclick="show('reports')">Reports</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
  <div class="card">
    <h2>Welcome to Velora</h2>
    <p>Your premium banking dashboard.</p>
  </div>
</div>

<!-- ACCOUNTS -->
<div id="accounts" class="section">
  <div class="card">
    <h3>Create Account</h3>
    <input id="accNo" placeholder="Account Number">
    <input id="name" placeholder="Name">
    <input id="balance" placeholder="Initial Balance">
    <button class="btn" onclick="createAccount()">Create</button>
  </div>
</div>

<!-- DEPOSIT -->
<div id="deposit" class="section">
  <div class="card">
    <h3>Deposit</h3>
    <input id="dAcc" placeholder="Account Number">
    <input id="dAmt" placeholder="Amount">
    <button class="btn" onclick="deposit()">Deposit</button>
  </div>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="section">
  <div class="card">
    <h3>Withdraw</h3>
    <input id="wAcc" placeholder="Account Number">
    <input id="wAmt" placeholder="Amount">
    <button class="btn" onclick="withdraw()">Withdraw</button>
  </div>
</div>

<!-- TRANSACTIONS -->
<div id="transactions" class="section">
  <div class="card">
    <button class="btn" onclick="viewTransactions()">Load Transactions</button>
  </div>
</div>

<!-- REPORTS -->
<div id="reports" class="section">
  <div class="card">
    <button class="btn" onclick="totalMoney()">Total Money</button>
    <button class="btn" onclick="lowBalance()">Low Balance</button>
  </div>
</div>

<div class="output" id="output">Ready.</div>

</div>
</div>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function out(t){
  document.getElementById("output").innerText = t;
}

function createAccount(){
  let r = Module.ccall("create_account","string",
  ["number","string","number"],
  [accNo.value,name.value,balance.value]);
  out(r);
}

function deposit(){
  let r = Module.ccall("deposit_money","string",
  ["number","number"],
  [dAcc.value,dAmt.value]);
  out(r);
}

function withdraw(){
  let r = Module.ccall("withdraw_money","string",
  ["number","number"],
  [wAcc.value,wAmt.value]);
  out(r);
}

function viewTransactions(){
  let r = Module.ccall("view_transactions","string",[],[]);
  out(r);
}

function totalMoney(){
  let r = Module.ccall("total_money_report","string",[],[]);
  out(r);
}

function lowBalance(){
  let r = Module.ccall("low_balance_report","string",
  ["number"],[1000]);
  out(r);
}

var Module = {
  onRuntimeInitialized: function(){
    out("System ready.");
  }
}
</script>

<script src="index.js"></script>

</body>
</html>
